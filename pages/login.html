<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriResponde - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="login">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-nr">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="../index.html"><i class="fas fa-leaf me-2"></i>NutriResponde</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topMenu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="topMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
          <li class="nav-item"><a class="nav-link" href="#" onclick="confirmLogout()">Sair</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="hero-nr p-4 p-md-5 mb-4 text-center">
          <i class="fas fa-heartbeat fa-3x mb-3"></i>
          <h1 class="fw-bold"><i class="fas fa-leaf me-2"></i>NutriResponde</h1>
          <p class="mb-0"><i class="fas fa-shield-heart me-2"></i>Sua plataforma de nutrição personalizada</p>
        </div>

        <div class="card card-hover">
          <div class="card-body p-4 p-md-5">
            <h2 class="h4 fw-bold mb-4"><i class="fas fa-right-to-bracket me-2 text-primary"></i>Entrar</h2>
            <form>
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-envelope me-2 text-primary"></i>Email</label>
                <input type="email" class="form-control" placeholder="seu@email.com">
              </div>
              <div class="mb-3">
                <label class="form-label"><i class="fas fa-lock me-2 text-primary"></i>Senha</label>
                <input type="password" class="form-control" placeholder="••••••••">
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label" for="rememberMe">Lembrar-me</label>
                </div>
                <a href="#" class="small text-decoration-none">Esqueci minha senha</a>
              </div>
              <button type="button" class="btn btn-nr-primary w-100 py-2 mb-3" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-right-to-bracket me-2"></i>Entrar</button>
              <p class="mb-0 text-center text-muted">Não tem conta? <a href="cadastro.html">Criar cadastro</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
