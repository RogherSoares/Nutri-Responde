<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriResponde - Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="cadastro">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-nr">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="../index.html"><i class="fas fa-leaf me-2"></i>NutriResponde</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topMenu"><span class="navbar-toggler-icon"></span></button>
    </div>
  </nav>

  <main class="container py-5">
    <div class="page-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
      <div>
        <h1><i class="fas fa-user-plus me-2 text-primary"></i>Criar conta</h1>
        <p><i class="fas fa-circle-info me-2 text-muted"></i>Escolha o tipo de perfil e preencha os dados.</p>
      </div>
      <a class="btn btn-nr-primary" href="../index.html">
        <i class="fas fa-arrow-left me-2"></i>Voltar ao início
      </a>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card card-hover h-100 border border-primary border-2">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div class="bg-primary bg-opacity-10 rounded-circle p-3 text-primary"><i class="fas fa-user fa-2x"></i></div>
              <div>
                <h2 class="h4 mb-1">Cliente / Paciente</h2>
                <p class="text-muted mb-0">Buscar nutricionistas e acompanhar seu plano.</p>
              </div>
            </div>
            <form>
              <div class="row g-3">
                <div class="col-md-6"><input class="form-control" placeholder="Nome completo"></div>
                <div class="col-md-6"><input class="form-control" placeholder="Email"></div>
                <div class="col-md-6"><input class="form-control" placeholder="Telefone"></div>
                <div class="col-md-6"><input type="date" class="form-control"></div>
                <div class="col-12"><input class="form-control" placeholder="Cidade"></div>
                <div class="col-12"><input class="form-control" placeholder="CEP"></div>
                <div class="col-md-6"><input type="password" class="form-control" placeholder="Senha"></div>
                <div class="col-md-6"><input type="password" class="form-control" placeholder="Confirmar senha"></div>
              </div>
              <div class="form-check mt-3 mb-4">
                <input class="form-check-input" type="checkbox" id="clienteTerms">
                <label class="form-check-label" for="clienteTerms">Aceito os termos de uso</label>
              </div>
              <button class="btn btn-nr-primary w-100"><i class="fas fa-id-card me-2"></i>Cadastrar cliente</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card card-hover h-100 border border-success border-2">
          <div class="card-body p-4 p-md-5">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div class="bg-success bg-opacity-10 rounded-circle p-3 text-success"><i class="fas fa-user-md fa-2x"></i></div>
              <div>
                <h2 class="h4 mb-1">Nutricionista</h2>
                <p class="text-muted mb-0">Gerenciar pacientes e criar planos nutricionais.</p>
              </div>
            </div>
            <form>
              <div class="row g-3">
                <div class="col-md-6"><input class="form-control" placeholder="Nome completo"></div>
                <div class="col-md-6"><input class="form-control" placeholder="Email"></div>
                <div class="col-md-6"><input class="form-control" placeholder="CRN"></div>
                <div class="col-md-6"><input class="form-control" placeholder="Telefone"></div>
                <div class="col-12"><input class="form-control" placeholder="Cidade"></div>
                <div class="col-12"><input class="form-control" placeholder="Valor da consulta"></div>
                <div class="col-12"><textarea class="form-control" rows="3" placeholder="Bio / descrição profissional"></textarea></div>
                <div class="col-md-6"><input type="password" class="form-control" placeholder="Senha"></div>
                <div class="col-md-6"><input type="password" class="form-control" placeholder="Confirmar senha"></div>
              </div>
              <div class="form-check mt-3 mb-4">
                <input class="form-check-input" type="checkbox" id="nutriTerms">
                <label class="form-check-label" for="nutriTerms">Confirmo meu registro profissional</label>
              </div>
              <button class="btn btn-success w-100"><i class="fas fa-user-md me-2"></i>Cadastrar nutricionista</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
