# GitHub Pages configuration for Nutri-Responde
title: NutriResponde
description: Plataforma de acompanhamento nutricional personalizado

# Disable Jekyll processing to serve static HTML directly
safe: false
plugins: []

# Exclude unnecessary files
exclude:
  - node_modules
  - src
  - test
  - package.json
  - package-lock.json
  - README.md
  - LICENSE
  - .gitignore
  - nest-cli.json
  - tsconfig.build.json
  - tsconfig.json
  - eslint.config.mjs
  - client.rest
